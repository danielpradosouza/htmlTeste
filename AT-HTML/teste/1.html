<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Texto alterado com JavaScript</h1>
    <p class="subtitle">
        Clique nos botões para ver alert, prompt, confirm, DOM, eventos e notificação.
    </p>

    <!-- STATUS -->
    <section class="box">
        <h2>Status</h2>
        <p id="status-text">Título alterado ✅</p>
        <p>Cliques: <span id="clicks">7</span> &nbsp;&nbsp; Hora: <span id="hora">09:48:05</span></p>
    </section>

    <!-- INTERAÇÕES BÁSICAS -->
    <section class="box">
        <h2>Interações básicas</h2>

        <div class="btn-group">
            <button onclick="showAlert()">Alert</button>
            <button onclick="showConfirm()">Confirm</button>
            <button onclick="showPrompt()">Prompt</button>
            <button onclick="showLog()">Console.log</button>
        </div>
    </section>

    <!-- DOM + EVENTOS -->
    <section class="box">
        <h2>DOM + Eventos</h2>

        <label>Digite seu nome:</label>
        <input id="nome" type="text" placeholder="Digite aqui...">

        <div class="btn-group">
            <button onclick="mostrarNome()">Mostrar na tela</button>
            <button onclick="mudarTitulo()">Mudar título</button>
            <button onclick="trocarTema()">Trocar tema</button>
            <button onclick="somar()">Somar 2 números</button>
        </div>

        <p>Extra: passe o mouse no bloco abaixo 👇</p>

        <div id="hoverBox" class="hover-box">
            Saiu (mouseleave)
        </div>

        <div id="notif" class="notification">
            Mouse entrou na caixa!
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
