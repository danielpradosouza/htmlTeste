<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desafio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">

        <div id="status">
            <h1>Status</h1>
            <p id="acao">Aguardando ação ...</p>

            <div id="clicar">
                <p id="cliques">Cliques:</p>
                <p id="clicou">0</p>
            </div>
        </div>

        <div id="interBasicas">
            <h1>Interações Básicas</h1>

            <button onclick="showAlert()">Alert</button>
            <button onclick="showConfirm()">Confirm</button>
            <button onclick="nomePrompt()">Prompt</button>
            <button onclick="showLog()">Console.log</button>
        </div>

        <div id="domEvent">
            <h1>DOM + Eventos</h1>

            <label for="inome">Digite seu Nome:</label><br>
            <input type="text" id="inome" placeholder="Seu nome aqui">

            <button onclick="nomeInput()">Mostrar na tela</button>
            <button onclick="mudarTitulo()">Mudar Título</button>
            <button onclick="mudarTema()">Trocar tema</button>

            <br><br>

            <h3>Somar dois números</h3>
            <input type="number" id="num1" placeholder="Número 1">
            <input type="number" id="num2" placeholder="Número 2">
            <button onclick="somar()">Somar</button>

            <p>Extra: passe o mouse no bloco abaixo 👇</p>
            <div id="mouseEvent">interaja.....</div>
        </div>

        <script src="script.js"></script>

    </main>
</body>
</html>
