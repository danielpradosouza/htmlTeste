<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #area{
            background-color: greenyellow;
            width: 50px;
            height: 50px;
            padding: 200px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div id="area">
        interaja ....
    </div>
    <script>
        var a =document.querySelector('#area')
        a.addEventListener('click',clicar)
        function clicar(){
            a.innerText=("Clicou")
        }
        a.addEventListener('mouseenter',mouseEntrou)
        function mouseEntrou(){
            a.innerText="mouse Entrou"

        }
        a.addEventListener('mouseout',mouseSaiu)
        function mouseSaiu(){
            a.innerText="Mouse Saiu"
        }
    </script>
</body>
</html>
