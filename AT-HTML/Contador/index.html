<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Contador: <span id="contador">0</span></h1>
    <button id="incrementar">incrementar</button>
    <button id="decrementar">decrementar</button>

    <script>
        let contador=0
        const contadorDisplay=document.querySelector('#contador')
        const botaoIncrentar=document.querySelector('#incrementar')
        const botaoDecrementar=document.querySelector('#decrementar')
        botaoIncrentar.addEventListener('click',()=>{
            contador++
            contadorDisplay.innerText=contador
        })
        botaoDecrementar.addEventListener('click',()=>{
            contador--
            contadorDisplay.innerText=contador
        })
    </script>
</body>
</html>
